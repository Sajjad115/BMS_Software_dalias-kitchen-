<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase History - Dalia's Kitchen</title>   
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2d2d2d; --accent: #e67e22; --bg: #fcfdb9; --danger: #ff4d4d; --success: #27ae60; }
        body {font-family: 'Segoe UI', sans-serif;background: #fffff8;margin: 0;display: flex;}
        
        /* Main Content Area */
        .main-content {margin-left: 280px;background: #fffff8;padding: 40px;width: calc(100% - 320px);}
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; color: #666; font-size: 14px; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; }

        /* Controls */
        .controls { display: flex; gap: 15px; align-items: center; }
        .search-box, .date-input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }

        /* Table Styling */
        .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #555; border-bottom: 2px solid #eee; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        
        /* Status Badges */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: white; display: inline-block; }
        .bg-paid { background: var(--success); }
        .bg-due { background: var(--danger); }
        
        /* Buttons */
        .btn-pay { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-pay:hover { background: #2980b9; }
        
        .sidebar ul li a.active { background: var(--accent); color: white; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="brand"><h2>DALIA'S KITCHEN</h2></div>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="sale-history.html">Sale History</a></li>
            <li><a href="sale-report.html">Sale Report</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="purchase-items.html" class="active">Purchase Items</a></li>
            <li><a href="lab.html" >Kitchen Lab</a></li>

        </ul>
    </nav>

    <div class="main-content">
        <div class="header-section">
            <h1>Purchase History</h1>
            <div class="controls">
                <input type="text" id="purSearch" class="search-box" placeholder="Search vendor or material...">
                <input type="date" id="filterDate" class="date-input">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Paid</h3>
                <p id="totalPaidText" style="color: var(--success);">৳0</p>
            </div>
            <div class="stat-card">
                <h3>Total Due</h3>
                <p id="totalDueText" style="color: var(--danger);">৳0</p>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Vendor</th>
                        <th>Materials & Qty</th>
                        <th>Unit Price</th>
                        <th>Total Price</th>
                        <th>Paid</th>
                        <th>Due</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="purchaseTbody">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="purchase-items.js"></script>
